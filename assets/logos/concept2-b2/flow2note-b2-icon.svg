<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-labelledby="title2i desc2i">
  <title id="title2i">Flow2Note B-Squared Icon</title>
  <desc id="desc2i">Interlocking B and N letters</desc>
  <defs>
    <linearGradient id="biliGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB7299" />
      <stop offset="100%" style="stop-color:#00A1D6" />
    </linearGradient>
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED" />
      <stop offset="100%" style="stop-color:#A78BFA" />
    </linearGradient>
  </defs>

  <circle cx="48" cy="48" r="46" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>

  <!-- B letter -->
  <circle cx="38" cy="38" r="28" fill="url(#biliGrad)" opacity="0.95" />
  <rect x="34" y="20" width="12" height="36" fill="url(#biliGrad)" />
  <rect x="36" y="22" width="8" height="14" rx="4" fill="#FFFFFF" />
  <rect x="36" y="40" width="8" height="14" rx="4" fill="#FFFFFF" />

  <!-- N letter overlapping -->
  <rect x="38" y="38" width="32" height="38" rx="5" fill="url(#noteGrad)" opacity="0.95" />
  <path d="M43,48 L43,64 L60,55 L60,71" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
