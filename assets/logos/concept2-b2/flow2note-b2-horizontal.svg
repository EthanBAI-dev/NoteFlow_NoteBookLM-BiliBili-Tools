<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80" role="img" aria-labelledby="title2 desc2">
  <title id="title2">Flow2Note - B Squared</title>
  <desc id="desc2">Stylized B and N letters combined representing Bilibili to NotebookLM</desc>
  <defs>
    <linearGradient id="biliGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB7299" />
      <stop offset="100%" style="stop-color:#00A1D6" />
    </linearGradient>
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED" />
      <stop offset="100%" style="stop-color:#A78BFA" />
    </linearGradient>
  </defs>

  <!-- B letter (Bilibili) - curved shapes -->
  <g id="letter-b">
    <circle cx="32" cy="40" r="28" fill="url(#biliGrad)" />
    <!-- Negative space B -->
    <path d="M28,22 L28,58 L40,58 Q50,58 50,50 Q50,44 44,40 Q50,36 50,30 Q50,22 40,22 Z" fill="#FFFFFF" />
    <rect x="28" y="22" width="12" height="36" fill="url(#biliGrad)" />
    <rect x="30" y="24" width="8" height="14" rx="4" fill="#FFFFFF" />
    <rect x="30" y="42" width="8" height="14" rx="4" fill="#FFFFFF" />
  </g>

  <!-- Arrow / flow indicator -->
  <g id="arrow" transform="translate(70, 28)">
    <path d="M0,12 L30,12 L24,6" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M0,12 L30,12 L24,18" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- N letter (NotebookLM) -->
  <g id="letter-n">
    <rect x="108" y="14" width="42" height="52" rx="6" fill="url(#noteGrad)" />
    <path d="M114,28 L114,52 L138,36 L138,60" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text -->
  <g id="wordmark">
    <text x="162" y="42" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#1F2937" letter-spacing="1">Flow2Note</text>
    <text x="162" y="58" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#9CA3AF" letter-spacing="3">BILIBILI → NOTEBOOKLM</text>
  </g>
</svg>
