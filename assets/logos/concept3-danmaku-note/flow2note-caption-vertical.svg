<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160" role="img" aria-labelledby="title3v desc3v">
  <title id="title3v">Flow2Note - Danmaku Caption Vertical</title>
  <desc id="desc3v">Subtitles transforming into a document</desc>
  <defs>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB7299" />
      <stop offset="100%" style="stop-color:#E5597A" />
    </linearGradient>
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A1D6" />
      <stop offset="100%" style="stop-color:#0077A3" />
    </linearGradient>
  </defs>

  <!-- Danmaku bubbles floating -->
  <g id="danmaku1">
    <rect x="18" y="12" width="72" height="24" rx="12" fill="url(#capGrad)" opacity="0.8" />
    <text x="54" y="29" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">字幕提取中...</text>
  </g>
  <g id="danmaku2">
    <rect x="38" y="42" width="54" height="20" rx="10" fill="url(#capGrad)" opacity="0.55" />
    <text x="65" y="56" font-family="Arial, sans-serif" font-size="9" font-weight="500" fill="#FFFFFF" text-anchor="middle">弹幕同步</text>
  </g>

  <!-- Downloading arrow -->
  <path d="M60,70 L60,84" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"/>
  <polygon points="56,78 60,86 64,78" fill="#9CA3AF" />

  <!-- Notebook -->
  <rect x="36" y="88" width="48" height="52" rx="5" fill="url(#noteGrad)" />
  <rect x="44" y="96" width="32" height="2" rx="1" fill="#FFFFFF" opacity="0.9" />
  <rect x="44" y="102" width="32" height="2" rx="1" fill="#FFFFFF" opacity="0.7" />
  <rect x="44" y="108" width="24" height="2" rx="1" fill="#FFFFFF" opacity="0.5" />
  <rect x="44" y="114" width="28" height="2" rx="1" fill="#FFFFFF" opacity="0.3" />

  <!-- Text -->
  <text x="60" y="155" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" fill="#1F2937" text-anchor="middle" letter-spacing="1">Flow2Note</text>
</svg>
