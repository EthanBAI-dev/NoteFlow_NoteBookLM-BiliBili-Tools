<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-labelledby="title3i desc3i">
  <title id="title3i">Flow2Note Danmaku Caption Icon</title>
  <desc id="desc3i">Subtitle caption merging into a notebook</desc>
  <defs>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB7299" />
      <stop offset="100%" style="stop-color:#E5597A" />
    </linearGradient>
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A1D6" />
      <stop offset="100%" style="stop-color:#0077A3" />
    </linearGradient>
  </defs>

  <circle cx="48" cy="48" r="46" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Caption/subtitle rounded box -->
  <rect x="14" y="28" width="68" height="24" rx="12" fill="url(#capGrad)" opacity="0.85" />
  <text x="48" y="44" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle">字幕 · 弹幕</text>

  <!-- Small decorative dots (like floating danmaku) -->
  <circle cx="20" cy="18" r="3" fill="#FB7299" opacity="0.5" />
  <circle cx="72" cy="14" r="2" fill="#FB7299" opacity="0.4" />
  <circle cx="80" cy="64" r="2.5" fill="#00A1D6" opacity="0.4" />
  <circle cx="12" cy="68" r="2" fill="#00A1D6" opacity="0.3" />

  <!-- Small notebook corner at bottom-right -->
  <rect x="58" y="56" width="22" height="28" rx="3" fill="url(#noteGrad)" opacity="0.9" />
  <rect x="63" y="62" width="12" height="1.5" rx="0.75" fill="#FFFFFF" opacity="0.8" />
  <rect x="63" y="66" width="12" height="1.5" rx="0.75" fill="#FFFFFF" opacity="0.6" />
  <rect x="63" y="70" width="8" height="1.5" rx="0.75" fill="#FFFFFF" opacity="0.4" />
</svg>
