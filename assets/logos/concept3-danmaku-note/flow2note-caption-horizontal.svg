<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80" role="img" aria-labelledby="title3 desc3">
  <title id="title3">Flow2Note - Danmaku Caption</title>
  <desc id="desc3">A subtitle/danmaku caption transforming into a notebook document</desc>
  <defs>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB7299" />
      <stop offset="100%" style="stop-color:#E5597A" />
    </linearGradient>
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A1D6" />
      <stop offset="100%" style="stop-color:#0077A3" />
    </linearGradient>
  </defs>

  <!-- Danmaku/caption box 1 -->
  <g id="danmaku1">
    <rect x="8" y="18" width="60" height="20" rx="10" fill="url(#capGrad)" opacity="0.85" />
    <text x="38" y="33" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle">字幕提取</text>
  </g>

  <!-- Danmaku/caption box 2 -->
  <g id="danmaku2">
    <rect x="28" y="44" width="50" height="18" rx="9" fill="url(#capGrad)" opacity="0.6" />
    <text x="53" y="57" font-family="Arial, sans-serif" font-size="8" font-weight="500" fill="#FFFFFF" text-anchor="middle">弹幕导入</text>
  </g>

  <!-- Arrow -->
  <path d="M88,40 L105,40" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"/>
  <polygon points="105,36 112,40 105,44" fill="#9CA3AF" />

  <!-- Notebook icon -->
  <g id="note-icon">
    <rect x="118" y="18" width="36" height="44" rx="4" fill="url(#noteGrad)" />
    <rect x="125" y="26" width="22" height="2" rx="1" fill="#FFFFFF" opacity="0.9" />
    <rect x="125" y="32" width="22" height="2" rx="1" fill="#FFFFFF" opacity="0.7" />
    <rect x="125" y="38" width="16" height="2" rx="1" fill="#FFFFFF" opacity="0.5" />
    <rect x="125" y="44" width="18" height="2" rx="1" fill="#FFFFFF" opacity="0.3" />
  </g>

  <!-- Text -->
  <g id="wordmark">
    <text x="168" y="42" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#1F2937" letter-spacing="1">Flow2Note</text>
    <text x="168" y="58" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#9CA3AF" letter-spacing="2">弹幕 · 字幕 · 笔记</text>
  </g>
</svg>
