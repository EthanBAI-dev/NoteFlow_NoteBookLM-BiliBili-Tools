<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80" role="img" aria-labelledby="title4 desc4">
  <title id="title4">Flow2Note - Flow Converge</title>
  <desc id="desc4">Abstract flowing ribbons converging from video to document</desc>
  <defs>
    <linearGradient id="ribbon1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB7299" />
      <stop offset="50%" style="stop-color:#00A1D6" />
      <stop offset="100%" style="stop-color:#7C3AED" />
    </linearGradient>
    <linearGradient id="ribbon2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00A1D6" />
      <stop offset="100%" style="stop-color:#7C3AED" />
    </linearGradient>
  </defs>

  <!-- Flowing ribbon 1 - upper -->
  <path d="M10,25 Q40,10 70,30 Q100,50 130,25 Q160,0 190,30 Q210,50 230,35" fill="none" stroke="url(#ribbon1)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>

  <!-- Flowing ribbon 2 - lower, converging -->
  <path d="M10,55 Q40,70 70,50 Q100,30 130,55 Q160,80 190,50 Q210,30 230,45" fill="none" stroke="url(#ribbon2)" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

  <!-- Danmaku dots along the flow -->
  <circle cx="25" cy="28" r="3" fill="#FB7299" />
  <circle cx="55" cy="22" r="2" fill="#F472B6" opacity="0.8" />
  <circle cx="85" cy="38" r="2.5" fill="#00A1D6" opacity="0.8" />
  <circle cx="115" cy="35" r="2" fill="#A78BFA" opacity="0.7" />
  <circle cx="145" cy="42" r="3" fill="#7C3AED" opacity="0.8" />
  <circle cx="175" cy="28" r="2" fill="#00A1D6" opacity="0.6" />
  <circle cx="205" cy="38" r="2.5" fill="#7C3AED" opacity="0.9" />

  <!-- Text -->
  <g id="wordmark" transform="translate(0, 5)">
    <text x="12" y="12" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="400" fill="#9CA3AF" letter-spacing="4">FLOW2NOTE</text>
  </g>
</svg>
