<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160" role="img" aria-labelledby="title4v desc4v">
  <title id="title4v">Flow2Note - Flow Converge Vertical</title>
  <desc id="desc4v">Flowing ribbons converging downward into a document</desc>
  <defs>
    <linearGradient id="ribbon1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB7299" />
      <stop offset="50%" style="stop-color:#00A1D6" />
      <stop offset="100%" style="stop-color:#7C3AED" />
    </linearGradient>
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED" />
      <stop offset="100%" style="stop-color:#A78BFA" />
    </linearGradient>
  </defs>

  <!-- Flowing ribbons converging downward -->
  <path d="M60,10 Q45,30 60,50 Q75,70 60,90 Q50,100 55,110" fill="none" stroke="url(#ribbon1)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <path d="M60,15 Q75,35 60,55 Q45,75 60,95 Q65,102 62,110" fill="none" stroke="url(#ribbon1)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Danmaku dots -->
  <circle cx="45" cy="22" r="2.5" fill="#FB7299" opacity="0.9" />
  <circle cx="75" cy="38" r="2" fill="#00A1D6" opacity="0.8" />
  <circle cx="42" cy="52" r="2.5" fill="#F472B6" opacity="0.7" />
  <circle cx="76" cy="68" r="2" fill="#A78BFA" opacity="0.6" />
  <circle cx="45" cy="82" r="2" fill="#00A1D6" opacity="0.5" />

  <!-- Notebook base -->
  <rect x="40" y="106" width="40" height="38" rx="4" fill="url(#noteGrad)" />
  <rect x="47" y="112" width="26" height="2" rx="1" fill="#FFFFFF" opacity="0.9" />
  <rect x="47" y="118" width="26" height="2" rx="1" fill="#FFFFFF" opacity="0.7" />
  <rect x="47" y="124" width="18" height="2" rx="1" fill="#FFFFFF" opacity="0.5" />

  <!-- Text -->
  <text x="60" y="155" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" fill="#1F2937" text-anchor="middle" letter-spacing="1">Flow2Note</text>
</svg>
