<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-labelledby="title4i desc4i">
  <title id="title4i">Flow2Note Flow Converge Icon</title>
  <desc id="desc4i">Abstract flowing ribbons forming F and N shapes</desc>
  <defs>
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB7299" />
      <stop offset="50%" style="stop-color:#00A1D6" />
      <stop offset="100%" style="stop-color:#7C3AED" />
    </linearGradient>
  </defs>

  <circle cx="48" cy="48" r="46" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Main ribbon forming flowing path -->
  <path d="M22,30 Q40,20 55,35 Q70,50 60,65 Q50,78 35,72" fill="none" stroke="url(#ribbonGrad)" stroke-width="5" stroke-linecap="round" opacity="0.85"/>

  <!-- Secondary flowing ribbon -->
  <path d="M28,45 Q45,35 60,50 Q75,65 65,75 Q58,82 50,78" fill="none" stroke="url(#ribbonGrad)" stroke-width="3" stroke-linecap="round" opacity="0.55"/>

  <!-- Danmaku dots -->
  <circle cx="30" cy="28" r="3" fill="#FB7299" opacity="0.9" />
  <circle cx="48" cy="32" r="2.5" fill="#F472B6" opacity="0.8" />
  <circle cx="65" cy="48" r="2" fill="#00A1D6" opacity="0.7" />
  <circle cx="62" cy="68" r="2.5" fill="#7C3AED" opacity="0.8" />

  <!-- Document corner hint -->
  <rect x="56" y="60" width="18" height="22" rx="2" fill="#7C3AED" opacity="0.2" />
  <rect x="59" y="65" width="12" height="1.5" rx="0.75" fill="#7C3AED" opacity="0.3" />
</svg>
