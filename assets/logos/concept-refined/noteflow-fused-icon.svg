<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-labelledby="title-i desc-i">
  <title id="title-i">Flow2Note - Fused Icon</title>
  <desc id="desc-i">A play button integrated into a notebook document</desc>
  <defs>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A1D6" />
      <stop offset="100%" style="stop-color:#FB7299" />
    </linearGradient>
  </defs>

  <!-- Outer circle for icon badge -->
  <circle cx="48" cy="48" r="46" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.2" />

  <!-- Notebook body (line art) -->
  <rect x="20" y="16" width="56" height="64" rx="6" fill="#FFFFFF" stroke="#1F2937" stroke-width="1.8" />

  <!-- Folded corner -->
  <path d="M60 16 L60 30 L76 30" fill="#F1F5F9" stroke="#1F2937" stroke-width="1.2" stroke-linejoin="round" />

  <!-- Page text lines -->
  <line x1="30" y1="30" x2="58" y2="30" stroke="#D1D5DB" stroke-width="1.2" stroke-linecap="round" />
  <line x1="30" y1="38" x2="58" y2="38" stroke="#D1D5DB" stroke-width="1.2" stroke-linecap="round" />
  <line x1="30" y1="46" x2="52" y2="46" stroke="#D1D5DB" stroke-width="1.2" stroke-linecap="round" />

  <!-- Play button seamlessly integrated on the notebook -->
  <circle cx="48" cy="62" r="16" fill="none" stroke="url(#playGrad)" stroke-width="2" />
  <polygon points="42,54 42,70 56,62" fill="url(#playGrad)" />
</svg>
