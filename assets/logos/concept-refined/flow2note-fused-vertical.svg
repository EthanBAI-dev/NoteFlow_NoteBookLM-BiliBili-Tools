<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150" width="100" height="150" role="img" aria-labelledby="title-v desc-v">
  <title id="title-v">Flow2Note - Fused Vertical</title>
  <desc id="desc-v">A play button integrated into a notebook document</desc>
  <defs>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A1D6" />
      <stop offset="100%" style="stop-color:#FB7299" />
    </linearGradient>
  </defs>

  <!-- Fused Icon -->
  <g id="fused-icon">
    <!-- Notebook body -->
    <rect x="14" y="8" width="72" height="84" rx="8" fill="#F8FAFC" stroke="#1F2937" stroke-width="2" />
    <!-- Folded corner -->
    <path d="M68 8 L68 26 L86 26" fill="#F1F5F9" stroke="#1F2937" stroke-width="1.5" stroke-linejoin="round" />

    <!-- Page lines -->
    <line x1="26" y1="20" x2="68" y2="20" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round" />
    <line x1="26" y1="28" x2="68" y2="28" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round" />
    <line x1="26" y1="36" x2="55" y2="36" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round" />

    <!-- Play button integrated -->
    <circle cx="50" cy="58" r="20" fill="none" stroke="url(#playGrad)" stroke-width="2.2" />
    <polygon points="43,49 43,67 59,58" fill="url(#playGrad)" />
  </g>

  <!-- Text -->
  <text x="50" y="132" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#1F2937" text-anchor="middle" letter-spacing="1">Flow2Note</text>
  <text x="50" y="145" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="400" fill="#9CA3AF" text-anchor="middle" letter-spacing="2">BILLIBILI → NOTEBOOKLM</text>
</svg>
