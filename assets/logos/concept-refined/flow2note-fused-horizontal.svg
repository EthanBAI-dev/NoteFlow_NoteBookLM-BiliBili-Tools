<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 70" width="260" height="70" role="img" aria-labelledby="title-h desc-h">
  <title id="title-h">Flow2Note - Fused Icon</title>
  <desc id="desc-h">A play button beautifully integrated into a notebook document</desc>
  <defs>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A1D6" />
      <stop offset="100%" style="stop-color:#FB7299" />
    </linearGradient>
  </defs>

  <!-- Fused Icon: Notebook + Play -->
  <g id="fused-icon" transform="translate(2, 2)">
    <!-- Notebook body (line art) -->
    <rect x="8" y="5" width="52" height="60" rx="5" fill="#F8FAFC" stroke="#1F2937" stroke-width="2" />
    <!-- Folded corner hint -->
    <path d="M48 5 L48 18 L60 18" fill="#F1F5F9" stroke="#1F2937" stroke-width="1.5" stroke-linejoin="round" />

    <!-- Page text lines (minimal) -->
    <line x1="18" y1="16" x2="42" y2="16" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round" />
    <line x1="18" y1="22" x2="42" y2="22" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round" />

    <!-- Play button circle integrated on the notebook -->
    <circle cx="34" cy="40" r="15" fill="none" stroke="url(#playGrad)" stroke-width="2" />
    <!-- Play triangle -->
    <polygon points="29,33 29,47 41,40" fill="url(#playGrad)" />
  </g>

  <!-- Wordmark -->
  <g id="wordmark">
    <text x="72" y="36" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="700" fill="#1F2937" letter-spacing="0.5">Flow2</text>
    <text x="72" y="56" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="300" fill="#6B7280" letter-spacing="2.5">NOTE</text>
  </g>
</svg>
