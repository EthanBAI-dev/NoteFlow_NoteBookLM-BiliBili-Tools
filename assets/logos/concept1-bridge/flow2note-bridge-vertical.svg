<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160" role="img" aria-labelledby="title1v desc1v">
  <title id="title1v">Flow2Note - Danmaku Bridge Vertical</title>
  <desc id="desc1v">A play button transforming into a document via flowing lines</desc>
  <defs>
    <linearGradient id="biliBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A1D6" />
      <stop offset="100%" style="stop-color:#0077A3" />
    </linearGradient>
    <linearGradient id="notePurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED" />
      <stop offset="100%" style="stop-color:#A78BFA" />
    </linearGradient>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FB7299;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00A1D6;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Play button -->
  <g id="play-icon">
    <circle cx="60" cy="32" r="24" fill="url(#biliBlue)" />
    <polygon points="51,22 51,42 70,32" fill="#FFFFFF" />
  </g>

  <!-- Flowing lines going down -->
  <g id="flow-lines" opacity="0.7">
    <path d="M60,58 Q55,68 60,78 Q65,88 60,98" fill="none" stroke="url(#flowGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M50,60 Q45,72 52,82 Q58,92 52,98" fill="none" stroke="url(#flowGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Notebook icon -->
  <g id="note-icon">
    <rect x="42" y="100" width="36" height="44" rx="4" fill="url(#notePurple)" />
    <rect x="49" y="108" width="22" height="2" rx="1" fill="#FFFFFF" opacity="0.9" />
    <rect x="49" y="114" width="22" height="2" rx="1" fill="#FFFFFF" opacity="0.7" />
    <rect x="49" y="120" width="16" height="2" rx="1" fill="#FFFFFF" opacity="0.5" />
    <rect x="49" y="126" width="18" height="2" rx="1" fill="#FFFFFF" opacity="0.3" />
  </g>

  <!-- Text -->
  <g id="wordmark">
    <text x="60" y="155" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" fill="#1F2937" text-anchor="middle" letter-spacing="1">Flow2Note</text>
  </g>
</svg>
