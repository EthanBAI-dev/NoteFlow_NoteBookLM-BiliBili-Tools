<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-labelledby="title1i desc1i">
  <title id="title1i">Flow2Note Icon</title>
  <desc id="desc1i">A play button transforming into a document via flowing lines</desc>
  <defs>
    <linearGradient id="biliBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A1D6" />
      <stop offset="100%" style="stop-color:#0077A3" />
    </linearGradient>
    <linearGradient id="notePurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED" />
      <stop offset="100%" style="stop-color:#A78BFA" />
    </linearGradient>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FB7299;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00A1D6;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="48" cy="48" r="46" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Play button -->
  <circle cx="30" cy="48" r="22" fill="url(#biliBlue)" />
  <polygon points="22,38 22,58 40,48" fill="#FFFFFF" />

  <!-- Flowing lines -->
  <g opacity="0.7">
    <path d="M52,38 Q62,33 72,48 Q82,63 66,48" fill="none" stroke="url(#flowGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M52,48 Q64,53 68,42" fill="none" stroke="url(#flowGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Notebook icon -->
  <rect x="56" y="32" width="28" height="36" rx="3" fill="url(#notePurple)" />
  <rect x="62" y="38" width="16" height="1.5" rx="0.75" fill="#FFFFFF" opacity="0.9" />
  <rect x="62" y="43" width="16" height="1.5" rx="0.75" fill="#FFFFFF" opacity="0.7" />
  <rect x="62" y="48" width="12" height="1.5" rx="0.75" fill="#FFFFFF" opacity="0.5" />
  <rect x="62" y="53" width="14" height="1.5" rx="0.75" fill="#FFFFFF" opacity="0.3" />
</svg>
