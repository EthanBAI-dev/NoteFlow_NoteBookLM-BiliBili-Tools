<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80" role="img" aria-labelledby="title1 desc1">
  <title id="title1">Flow2Note - Danmaku Bridge</title>
  <desc id="desc1">A play button transforming into a document via flowing lines</desc>
  <defs>
    <linearGradient id="biliBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A1D6" />
      <stop offset="100%" style="stop-color:#0077A3" />
    </linearGradient>
    <linearGradient id="notePurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED" />
      <stop offset="100%" style="stop-color:#A78BFA" />
    </linearGradient>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FB7299;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00A1D6;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Play button (Bilibili video) -->
  <g id="play-icon">
    <circle cx="35" cy="40" r="28" fill="url(#biliBlue)" />
    <polygon points="24,28 24,52 48,40" fill="#FFFFFF" />
  </g>

  <!-- Flowing lines (danmaku/subtitles flowing) -->
  <g id="flow-lines" opacity="0.7">
    <path d="M65,35 Q85,30 100,40 Q115,50 130,40" fill="none" stroke="url(#flowGrad)" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" from="200" to="0" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M65,45 Q85,50 100,40 Q115,30 130,40" fill="none" stroke="url(#flowGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
      <animate attributeName="stroke-dashoffset" from="200" to="0" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Notebook/Document icon (NotebookLM) -->
  <g id="note-icon">
    <rect x="135" y="18" width="36" height="44" rx="4" fill="url(#notePurple)" />
    <rect x="142" y="26" width="22" height="2" rx="1" fill="#FFFFFF" opacity="0.9" />
    <rect x="142" y="32" width="22" height="2" rx="1" fill="#FFFFFF" opacity="0.7" />
    <rect x="142" y="38" width="16" height="2" rx="1" fill="#FFFFFF" opacity="0.5" />
    <rect x="142" y="44" width="18" height="2" rx="1" fill="#FFFFFF" opacity="0.3" />
  </g>

  <!-- Text -->
  <g id="wordmark">
    <text x="185" y="42" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#1F2937" letter-spacing="1">Flow2</text>
    <text x="185" y="62" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="300" fill="#6B7280" letter-spacing="2">NOTE</text>
  </g>
</svg>
