<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 510" width="450" height="510" role="img" aria-labelledby="breadV4Title">
  <title id="breadV4Title">记忆面包 - 三横杠版本</title>
  <style>
    .crust { fill: #78350F; }
    .bread { fill: #FDE68A; }
    .line-color { fill: #78350F; }
  </style>

  <!-- Shadow -->
  <ellipse cx="225" cy="472" rx="140" ry="12" fill="#451A03" opacity="0.08"/>

  <!-- CRUST — outer bread shell -->
  <path
    d="
      M 80,44
      C 68,44 65,50 65,60
      L 65,442
      C 65,452 73,458 83,458
      L 367,458
      C 377,458 385,452 385,442
      L 385,115
      L 305,35
      L 80,35
      C 68,35 65,40 65,48
      Z
    "
    class="crust"
  />

  <!-- BREAD INTERIOR -->
  <path
    d="
      M 89,60
      C 81,60 81,64 81,70
      L 81,434
      C 81,440 85,442 91,442
      L 357,442
      C 363,442 369,440 369,434
      L 369,123
      L 297,51
      L 89,51
      C 83,51 81,54 81,60
      Z
    "
    class="bread"
  />

  <!--
     3 BOLD DOCUMENT LINES — thick, wide spacing, evenly distributed
     Bread interior y-range: 50 to 440 → center = 245
     Line count: 3 → 2 gaps → 35px between line centers
     Line thickness: 12px (was 8px, +50%)
     Evenly spread around center: y=210, y=250, y=290
  -->
  <g opacity="0.18" transform="translate(123, 195)">
    <!-- Line 1 — top (longest) -->
    <rect x="0" y="0" width="200" height="12" rx="5" class="line-color"/>
    <!-- Line 2 — middle (shorter) -->
    <rect x="25" y="40" width="150" height="12" rx="5" class="line-color"/>
    <!-- Line 3 — bottom (medium) -->
    <rect x="12" y="80" width="176" height="12" rx="5" class="line-color"/>
  </g>

  <!-- DIAGONAL CUT EDGE SHADOW -->
  <path
    d="M 298,54 L 366,126"
    stroke="#B45309"
    stroke-width="1.5"
    fill="none"
    opacity="0.2"
    stroke-linecap="round"
  />

  <!-- BOTTOM EDGE HIGHLIGHT -->
  <path
    d="M 88,438 C 120,442 330,442 362,438"
    fill="none"
    stroke="#FEF3C7"
    stroke-width="1.5"
    opacity="0.25"
    stroke-linecap="round"
  />
</svg>
