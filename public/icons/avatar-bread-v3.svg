<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="v3Title">
  <title id="v3Title">记忆面包 - 方形面包头像</title>
  <defs>
    <!-- Bread crust gradient (outer) -->
    <linearGradient id="crustOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#78350F;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#92400E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#78350F;stop-opacity:1" />
    </linearGradient>

    <!-- Bread inner crust gradient -->
    <linearGradient id="crustInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A16207;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B45309;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92400E;stop-opacity:1" />
    </linearGradient>

    <!-- Bread body gradient (golden) -->
    <linearGradient id="breadBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#FDE68A;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#451A03" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- ===== Outermost layer: Dark brown crust ===== -->
  <rect x="16" y="16" width="480" height="480" rx="32" ry="32" fill="url(#crustOuter)" filter="url(#shadow)"/>

  <!-- ===== Inner crust ring ===== -->
  <rect x="32" y="32" width="448" height="448" rx="24" ry="24" fill="url(#crustInner)"/>

  <!-- ===== Bread body (golden interior) ===== -->
  <rect x="44" y="44" width="424" height="424" rx="18" ry="18" fill="url(#breadBody)"/>

  <!-- ===== Bread texture: subtle air pockets ===== -->
  <g opacity="0.10">
    <ellipse cx="120" cy="120" rx="12" ry="8" fill="#92400E"/>
    <ellipse cx="380" cy="150" rx="10" ry="6" fill="#92400E"/>
    <ellipse cx="200" cy="380" rx="14" ry="7" fill="#92400E"/>
    <ellipse cx="340" cy="350" rx="8" ry="5" fill="#92400E"/>
    <ellipse cx="100" cy="300" rx="9" ry="6" fill="#92400E"/>
    <ellipse cx="160" cy="200" rx="7" ry="5" fill="#92400E"/>
    <ellipse cx="400" cy="250" rx="11" ry="6" fill="#92400E"/>
    <ellipse cx="280" cy="130" rx="6" ry="4" fill="#92400E"/>
    <ellipse cx="130" cy="400" rx="8" ry="5" fill="#92400E"/>
    <ellipse cx="300" cy="420" rx="10" ry="6" fill="#92400E"/>
    <ellipse cx="260" cy="200" rx="7" ry="4" fill="#92400E"/>
    <ellipse cx="80" cy="240" rx="6" ry="5" fill="#92400E"/>
  </g>

  <!-- ===== Bread inner highlight (center glow) ===== -->
  <ellipse cx="256" cy="256" rx="120" ry="100" fill="#FEF3C7" opacity="0.2"/>

  <!-- ===== Central identifier: Three horizontal lines (document layout) ===== -->
  <g transform="translate(256,256)">
    <!-- White background capsule -->
    <rect x="-52" y="-36" width="104" height="72" rx="18" fill="#FFFFFF" opacity="0.92"/>
    <rect x="-52" y="-36" width="104" height="72" rx="18" fill="none" stroke="#78350F" stroke-width="2.5"/>

    <!-- Top line (title) -->
    <rect x="-36" y="-22" width="72" height="10" rx="4" fill="#78350F"/>

    <!-- Middle line (body) -->
    <rect x="-36" y="-2" width="48" height="8" rx="3.5" fill="#78350F"/>

    <!-- Bottom line (detail) -->
    <rect x="-36" y="16" width="60" height="6" rx="3" fill="#78350F"/>
  </g>

  <!-- ===== Top edge crust highlight ===== -->
  <rect x="44" y="44" width="424" height="4" rx="2" fill="#FDE68A" opacity="0.3"/>
</svg>
